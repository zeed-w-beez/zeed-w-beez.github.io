<body>
<div class="game-container">
  <h1>💎 宝石星星消消乐</h1>
  <div class="controls">
    <div class="score-board">得分: <span id="score">0</span></div>
    <select id="difficulty">
      <option value="3">3 × 3</option>
      <option value="4" selected>4 × 4</option>
      <option value="5">5 × 5</option>
      <option value="6">6 × 6</option>
    </select>
    <button onclick="resetGame()">🔄 重置</button>
  </div>
  
  <div class="board" id="board"></div>
  <div class="message" id="message"></div>
</div>

<script>
// 定义宝石颜色数量
const GEM_TYPES = 6; 
let board = [];
let size = 4;
let score = 0;
let selectedCell = null;
let isProcessing = false;

function initGame() {
  size = parseInt(document.getElementById('difficulty').value);
  score = 0;
  selectedCell = null;
  isProcessing = false;
  updateScore();
  showMessage('');
  generateBoard();
  renderBoard();
}

function generateBoard() {
  board = [];
  for (let i = 0; i < size; i++) {
    board[i] = [];
    for (let j = 0; j < size; j++) {
      board[i][j] = getRandomGem();
    }
  }
  // 确保初始没有匹配
  while (findMatches().length > 0) {
    for (let i = 0; i < size; i++) {
      for (let j = 0; j < size; j++) {
        board[i][j] = getRandomGem();
      }
    }
  }
}

function getRandomGem() {
  return Math.floor(Math.random() * GEM_TYPES);
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  // 设置网格列数
  boardEl.style.gridTemplateColumns = `repeat(${size}, 60px)`;
  
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = i;
      cell.dataset.col = j;
      
      if (board[i][j] !== null) {
        const gem = document.createElement('div');
        gem.className = `gem-star color-${board[i][j]}`;
        cell.appendChild(gem);
      }
      
      cell.onclick = () => handleCellClick(i, j);
      boardEl.appendChild(cell);
    }
  }
}

function handleCellClick(row, col) {
  if (isProcessing) return;
  
  const cells = document.querySelectorAll('.cell');
  const index = row * size + col;
  
  if (!selectedCell) {
    // 第一次点击
    selectedCell = { row, col };
    cells[index].classList.add('selected');
  } else {
    // 第二次点击
    const prevIndex = selectedCell.row * size + selectedCell.col;
    cells[prevIndex].classList.remove('selected');
    
    // 如果点击的是同一个，取消选择
    if (selectedCell.row === row && selectedCell.col === col) {
      selectedCell = null;
      return;
    }
    
    // 检查是否相邻
    if (isAdjacent(selectedCell.row, selectedCell.col, row, col)) {
      // 尝试交换
      attemptSwap(selectedCell.row, selectedCell.col, row, col);
      selectedCell = null;
    } else {
      // 不相邻，更新选择
      selectedCell = { row, col };
      cells[index].classList.add('selected');
    }
  }
}

function isAdjacent(r1, c1, r2, c2) {
  return (Math.abs(r1 - r2) === 1 && c1 === c2) || 
         (Math.abs(c1 - c2) === 1 && r1 === r2);
}

async function attemptSwap(r1, c1, r2, c2) {
  isProcessing = true;
  
  // 1. 执行交换
  swapInBoard(r1, c1, r2, c2);
  renderBoard(); // 渲染交换后的状态
  
  // 2. 检查是否有匹配
  const matches = findMatches();
  
  if (matches.length > 0) {
    // 有匹配，继续消除流程
    await processMatches();
  } else {
    // 无匹配，延迟后交换回去（回弹效果）
    showMessage('❌ 无法消除，返回原位');
    await sleep(400); // 等待用户看清交换后的样子
    swapInBoard(r1, c1, r2, c2); // 换回来
    renderBoard();
    isProcessing = false;
  }
}

function swapInBoard(r1, c1, r2, c2) {
  const temp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = temp;
}

function findMatches() {
  const matches = [];
  
  // 横向检查
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size - 2; j++) {
      if (board[i][j] !== null && board[i][j] === board[i][j+1] && board[i][j] === board[i][j+2]) {
        let k = j;
        while (k < size && board[i][k] === board[i][j]) {
          matches.push({ row: i, col: k });
          k++;
        }
      }
    }
  }
  
  // 纵向检查
  for (let j = 0; j < size; j++) {
    for (let i = 0; i < size - 2; i++) {
      if (board[i][j] !== null && board[i][j] === board[i+1][j] && board[i][j] === board[i+2][j]) {
        let k = i;
        while (k < size && board[k][j] === board[i][j]) {
          matches.push({ row: k, col: j });
          k++;
        }
      }
    }
  }
  
  // 去重
  const uniqueMatches = [];
  const seen = new Set();
  for (const match of matches) {
    const key = `${match.row},${match.col}`;
    if (!seen.has(key)) {
      seen.add(key);
      uniqueMatches.push(match);
    }
  }
  
  return uniqueMatches;
}

async function processMatches() {
  let combo = 0;
  
  while (true) {
    const matches = findMatches();
    if (matches.length === 0) break;
    
    combo++;
    const points = matches.length * 10 * combo;
    score += points;
    updateScore();
    
    if (combo > 1) {
      showMessage(`🔥 连击 x${combo}! +${points}分`, true);
    } else {
      showMessage(`✨ 消除 ${matches.length} 个! +${points}分`);
    }
    
    // 消除动画
    const cells = document.querySelectorAll('.cell');
    for (const match of matches) {
      const index = match.row * size + match.col;
      cells[index].classList.add('matched');
    }
    
    await sleep(400);
    
    // 移除数据
    for (const match of matches) {
      board[match.row][match.col] = null;
    }
    
    // 下落填充
    dropCells();
    renderBoard();
    
    await sleep(300);
  }
  
  isProcessing = false;
  
  // 检查死局
  if (!canMakeMove()) {
    showMessage('🔄 没有可消除的了，自动刷新！');
    await sleep(1500);
    generateBoard();
    renderBoard();
    showMessage('✨ 新游戏开始！');
  }
}

function dropCells() {
  for (let j = 0; j < size; j++) {
    let writePos = size - 1;
    for (let i = size - 1; i >= 0; i--) {
      if (board[i][j] !== null) {
        board[writePos][j] = board[i][j];
        if (writePos !== i) {
          board[i][j] = null;
        }
        writePos--;
      }
    }
    // 填充顶部空缺
    for (let i = writePos; i >= 0; i--) {
      board[i][j] = getRandomGem();
    }
  }
}

function canMakeMove() {
  // 检查所有可能的交换
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      // 尝试向右交换
      if (j < size - 1) {
        swapInBoard(i, j, i, j + 1);
        if (findMatches().length > 0) {
          swapInBoard(i, j, i, j + 1); // 还原
          return true;
        }
        swapInBoard(i, j, i, j + 1); // 还原
      }
      // 尝试向下交换
      if (i < size - 1) {
        swapInBoard(i, j, i + 1, j);
        if (findMatches().length > 0) {
          swapInBoard(i, j, i + 1, j); // 还原
          return true;
        }
        swapInBoard(i, j, i + 1, j); // 还原
      }
    }
  }
  return false;
}

function updateScore() {
  document.getElementById('score').textContent = score;
}

function showMessage(text, isCombo = false) {
  const msgEl = document.getElementById('message');
  msgEl.textContent = text;
  msgEl.className = 'message' + (isCombo ? ' combo' : '');
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function resetGame() {
  initGame();
}

document.getElementById('difficulty').addEventListener('change', initGame);

// 启动
initGame();
</script>
